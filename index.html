<body>

</div>

<div id="april-message" class="april-message hidden">
    <div class="april-box">
        <h2>Abril: Escuchar Su voz</h2>
        <p>

            guardarla en el corazón y ponerla en práctica cada día.

        A+

    <button class="floating-btn version-btn" data-version="rvr60">
        RVR60
    </button>

    <button class="floating-btn version-btn" data-version="ntv">
        NTV

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyATEQ0kmd3HPloNlZ872t8C11jiYitLkUk",
    authDomain: "su-voz-a-diario.firebaseapp.com",
    projectId: "su-voz-a-diario",
    storageBucket: "su-voz-a-diario.firebasestorage.app",
    messagingSenderId: "372912228994",
    appId: "1:372912228994:web:f252b44bdbd00d7c56429b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const messaging = getMessaging(app);

  // Exponer a window
  window.firebaseDb = db;
  window.firebaseAuth = auth;
  window.firebaseMessaging = messaging;
  
  // También exponer las funciones individuales (por si acaso)
  window.fcmGetToken = getToken;
  window.fcmOnMessage = onMessage;
  
  console.log('[Index] Firebase inicializado correctamente');
</script>

<script type="module" src="js/app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const registration = await navigator.serviceWorker.register('./sw.js?v=9', {
             scope: './'
            });

            console.log('[Index] ServiceWorker registrado correctamente', registration.scope);

            if (!navigator.serviceWorker.controller) {
                console.log('[Index] Esta carga aún no está controlada por el SW. Recargando una vez...');
                window.location.reload();
                return;
            }

            console.log('[Index] La página ya está controlada por el SW');
        } catch (error) {
            console.error('[Index] Error registrando ServiceWorker:', error);
        }
    });
}
</script>
