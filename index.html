    <!-- Service Worker Registration con mejora de rendimiento -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Registrar SW con estrategia de actualización
                navigator.serviceWorker.register('sw.js')
                    .then(reg => {
                        console.log('✅ ServiceWorker registrado exitosamente');
                        
                        // Escuchar actualizaciones
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            console.log('🔄 Nueva versión del ServiceWorker encontrada');
                            
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('📦 Nueva versión disponible. Recarga para actualizar.');
                                    // Mostrar notificación de actualización
                                    if (window.App && App.showToast) {
                                        App.showToast('🔄 Nueva versión disponible. Recarga para actualizar.');
                                    }
                                }
                            });
                        });
                    })
                    .catch(err => {
                        console.error('❌ ServiceWorker registration failed: ', err);
                    });
            });
        }
        
        // Detectar si la app está instalada como PWA
        if (window.matchMedia('(display-mode: standalone)').matches) {
            console.log('📱 App ejecutándose en modo standalone (instalada)');
            document.documentElement.classList.add('pwa-installed');
        }
        
        // Manejar errores de red globales
        window.addEventListener('online', () => {
            console.log('🟢 Conexión recuperada');
            if (window.App && App.showToast) {
                App.showToast('🟢 Conexión recuperada', 2000);
            }
        });
        
        window.addEventListener('offline', () => {
            console.log('🔴 Sin conexión');
            if (window.App && App.showToast) {
                App.showToast('🔴 Sin conexión a internet', 3000);
            }
        });
    </script>
